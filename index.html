<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Design Print-On-Demand Toolkit</title>
    <!-- Modern UI Sans-Serif Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Abril+Fatface&family=Anton&family=Archivo+Black&family=Bebas+Neue&family=Bungee&family=Caveat&family=DM+Serif+Display&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,700;1,9..144,400&family=Permanent+Marker&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Shrikhand&display=swap" rel="stylesheet">
    
    <!-- CDNs for High-Res Canvas Export & Archiving -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <style>
        :root {
            --bg-primary: #FFFFFF;
            --border-color: #E5E5E5;
            --text-main: #0A0A0A;
            --text-muted: #7A7A7A;
            --accent-primary: #0A0A0A;
            --accent-action: #C5573A; /* Terracotta for main actions */
            --hover-bg: #F5F5F5;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Top Header Utilities */
        header {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Main App Grid Layout */
        .workspace {
            display: grid;
            grid-template-columns: 320px 340px 1fr;
            flex: 1;
            overflow: hidden;
        }

        .panel {
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 24px;
        }

        .panel:last-child {
            border-right: none;
            background-color: #FAFAFA;
        }

        h2 {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            margin-bottom: 16px;
        }

        /* Form Controls UI Elements */
        .group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        input[type="text"], textarea, select {
            width: 100%;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 10px 12px;
            font-family: inherit;
            font-size: 13px;
            color: var(--text-main);
            background: #FFFFFF;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus, textarea:focus, select:focus {
            border-color: var(--text-main);
        }

        textarea {
            resize: none;
            height: 120px;
            font-family: monospace;
        }

        /* Sliders */
        .slider-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }
        .slider-val { font-size: 11px; color: var(--text-muted); }
        input[type="range"] {
            width: 100%;
            accent-color: var(--text-main);
        }

        /* Segmented Buttons Control Button Layout */
        .segmented {
            display: flex;
            gap: 4px;
            background: #F0F0F0;
            padding: 3px;
            border-radius: 4px;
        }

        .segmented button {
            flex: 1;
            background: transparent;
            border: none;
            font-family: inherit;
            font-size: 11px;
            padding: 6px;
            cursor: pointer;
            border-radius: 3px;
            transition: all 0.2s;
        }

        .segmented button.active {
            background: #FFFFFF;
            font-weight: 500;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        /* Preset Chips Container styling */
        .chips {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 12px;
        }

        .chip {
            font-size: 11px;
            background: var(--hover-bg);
            border: 1px solid var(--border-color);
            padding: 4px 8px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .chip:hover {
            border-color: var(--text-main);
            background: #FFFFFF;
        }

        /* Color Picker Swatches */
        .color-presets {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-top: 8px;
        }

        .swatch {
            width: 24px;
            height: 24px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
            cursor: pointer;
            transition: transform 0.1s;
        }

        .swatch:hover, .swatch.active {
            transform: scale(1.1);
            border-color: var(--text-main);
        }

        /* Action Buttons Utilities */
        button.primary {
            width: 100%;
            background: var(--accent-action);
            color: #FFFFFF;
            border: none;
            border-radius: 4px;
            padding: 12px;
            font-family: inherit;
            font-weight: 500;
            font-size: 13px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button.primary:hover { opacity: 0.9; }

        button.secondary {
            width: 100%;
            background: var(--accent-primary);
            color: #FFFFFF;
            border: none;
            border-radius: 4px;
            padding: 10px;
            font-family: inherit;
            font-size: 12px;
            cursor: pointer;
            margin-top: 8px;
        }

        /* Right Panel Elements Viewport Display Grid */
        .preview-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-color);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 16px;
        }

        .card {
            background: #FFFFFF;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Production Sandbox Sizing Element Configuration matrix ratio mapping wrapper */
        .canvas-container-wrapper {
            width: 100%;
            aspect-ratio: 45 / 54;
            position: relative;
            overflow: hidden;
            background: #FFFFFF;
        }

        /* Checkered Transparent Texture Layout Background */
        .bg-transparent {
            background-color: #333;
            background-image: linear-gradient(45deg, #444 25%, transparent 25%), linear-gradient(-45deg, #444 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #444 75%), linear-gradient(-45deg, transparent 75%, #444 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
        }
        .bg-white { background: #FFFFFF !important; }
        .bg-black { background: #111111 !important; }
        .bg-grey { background: #7F7F7F !important; }

        /* Real Production Hidden / Downscaled Sandbox Canvas Assembly Element */
        .tshirt-canvas {
            width: 4500px;
            height: 5400px;
            position: absolute;
            top: 0;
            left: 0;
            transform-origin: top left;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 300px;
            box-sizing: border-box;
            background: transparent !important;
        }

        /* Dynamic Layout Text Block Typography Wrapping Engine Logic */
        .text-wrapper-box {
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            overflow-wrap: break-word;
            word-break: break-word;
        }

        .text-line {
            line-height: 1.2;
            width: 100%;
        }

        /* Enhanced Typography Multi-Layer Visual Style Hierarchy Settings */
        .placeholder-highlight {
            font-family: inherit;
            color: inherit;
        }
        .alt-font-active .placeholder-highlight {
            font-family: 'Shrikhand', cursive !important;
            text-transform: none !important;
        }

        .card-actions {
            padding: 12px;
            border-top: 1px solid var(--border-color);
            background: #FFFFFF;
            display: flex;
            gap: 8px;
        }

        .card-actions button {
            flex: 1;
            padding: 8px;
            font-family: inherit;
            font-size: 11px;
            border: 1px solid var(--border-color);
            background: #FFFFFF;
            cursor: pointer;
            border-radius: 4px;
        }
        .card-actions button:hover { background: var(--hover-bg); }

        /* Visual Progress Loader Overlay */
        .loader-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.9);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 9999;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border-color);
            border-top-color: var(--accent-action);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Modal Preview Window Overlay */
        .modal {
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 5000;
        }
        .modal-content {
            width: 500px;
            background: #FFF;
            padding: 12px;
            border-radius: 4px;
            position: relative;
        }
    </style>
</head>
<body>

    <header>
        <h1>Claude Design Print-On-Demand Toolkit</h1>
        <div style="font-size: 11px; color: var(--text-muted)">Studio Matrix Utility v2.1</div>
    </header>

    <div class="workspace">
        <!-- Panel 1: Template Builder & Automated Trend Hijacker -->
        <div class="panel">
            <h2>Template Builder</h2>
            <div class="group">
                <label>Saved Templates</label>
                <div class="chips" id="templateChips"></div>
                <button class="secondary" style="margin-top:0; background:#FFF; color:#0A0A0A; border:1px solid #0A0A0A" onclick="saveCurrentTemplate()">Save Structural Blueprint</button>
            </div>

            <div class="group">
                <label>Design Text Layout Base</label>
                <input type="text" id="templateInput" value="{hobby} is my cardio">
            </div>

            <!-- Trend Hijacker Engine Dropdown Matrix Activation Module -->
            <div class="group" style="background: #FAFAFA; padding: 12px; border-radius: 4px; border: 1px dashed var(--border-color)">
                <label style="color: var(--accent-action); font-weight:700">⚡ Trend Hijacker Automation</label>
                
                <div style="display:flex; gap: 8px; margin-bottom: 12px;">
                    <select id="aiVariationCount" style="width: auto; flex-shrink: 0;">
                        <option value="5">5 Designs</option>
                        <option value="10">10 Designs</option>
                        <option value="20">20 Designs</option>
                        <option value="30" selected>30 Designs</option>
                    </select>
                    <button id="aiTrendBtn" class="primary" style="flex: 1; background: #6B46C1; margin: 0;" onclick="generateLiveTrend()">🤖 Auto-Generate Live Trend</button>
                </div>
                
                <select id="hijackSelector" onchange="injectTrendVariables()">
                    <option value="">-- Or use Pre-Verified Niche Keywords --</option>
                    <option value="runners">High-Volume: Local Run Club Satire</option>
                    <option value="corporate">High-Volume: Corporate Workplace / Gifting</option>
                    <option value="dogs">High-Volume: Breed-Specific Behavior Traits</option>
                </select>
                <div style="font-size:10px; color: var(--text-muted); margin-top: 4px">Instantly load search-backed lists without manual brainstorming.</div>
            </div>

            <div class="group">
                <label>Bulk Variations Array (One Per Line / CSV Parsing Mode)</label>
                <textarea id="bulkValues" placeholder="Pumping Iron&#10;Running&#10;Shopping&#10;Weightlifting"></textarea>
            </div>

            <button class="primary" onclick="generateGrid()">Generate Variations Preview</button>
        </div>

        <!-- Panel 2: Enhanced Visual Canvas Controls -->
        <div class="panel">
            <h2>Design Controls</h2>
            
            <div class="group">
                <label>Primary Typography Face</label>
                <select id="fontFamily" onchange="updateLiveStyle()">
                    <option value="Anton" style="font-family:'Anton'">Anton (heavy display)</option>
                    <option value="Bebas Neue" style="font-family:'Bebas Neue'" selected>Bebas Neue (bold condensed)</option>
                    <option value="Archivo Black" style="font-family:'Archivo Black'">Archivo Black (bold sans)</option>
                    <option value="Bungee" style="font-family:'Bungee'">Bungee (athletic display)</option>
                    <option value="Playfair Display" style="font-family:'Playfair Display'">Playfair Display (elegant serif)</option>
                    <option value="DM Serif Display" style="font-family:'DM Serif Display'">DM Serif Display (modern serif)</option>
                    <option value="Abril Fatface" style="font-family:'Abril Fatface'">Abril Fatface (retro serif)</option>
                    <option value="Fraunces" style="font-family:'Fraunces'">Fraunces (editorial serif)</option>
                    <option value="Space Grotesk" style="font-family:'Space Grotesk'">Space Grotesk (modern geometric)</option>
                    <option value="Caveat" style="font-family:'Caveat'">Caveat (script)</option>
                    <option value="Permanent Marker" style="font-family:'Permanent Marker'">Permanent Marker (handwritten)</option>
                    <option value="Shrikhand" style="font-family:'Shrikhand'">Shrikhand (chunky retro)</option>
                </select>
            </div>

            <!-- Enhanced Typography Design Engine Setting Matrix Upgrade -->
            <div class="group">
                <label>Visual Contrast Engine (Dual-Font Hierarchy Layout)</label>
                <div class="segmented">
                    <button id="altFontFalse" class="active" onclick="toggleAltFont(false)">Uniform Style</button>
                    <button id="altFontTrue" onclick="toggleAltFont(true)">Isolate & Style {Value}</button>
                </div>
            </div>

            <div class="group">
                <label>Text Color</label>
                <input type="text" id="textColorHex" value="#0A0A0A" oninput="updateLiveStyle()" style="margin-bottom: 6px">
                <div class="color-presets">
                    <div class="swatch" style="background:#0A0A0A" onclick="setPresetColor('#0A0A0A')"></div>
                    <div class="swatch" style="background:#FFFFFF" onclick="setPresetColor('#FFFFFF')"></div>
                    <div class="swatch" style="background:#F5E6D3" onclick="setPresetColor('#F5E6D3')"></div>
                    <div class="swatch" style="background:#C5573A" onclick="setPresetColor('#C5573A')"></div>
                    <div class="swatch" style="background:#7A8B6F" onclick="setPresetColor('#7A8B6F')"></div>
                    <div class="swatch" style="background:#1F2D4F" onclick="setPresetColor('#1F2D4F')"></div>
                    <div class="swatch" style="background:#D4A017" onclick="setPresetColor('#D4A017')"></div>
                </div>
            </div>

            <div class="group">
                <label>Canvas Text Sizing</label>
                <div class="slider-container">
                    <input type="range" id="fontSizeSlider" min="150" max="650" value="380" oninput="updateLiveStyle()">
                    <span class="slider-val" id="fontSizeVal">380px</span>
                </div>
            </div>

            <div class="group">
                <label>Letter Tracking</label>
                <div class="slider-container">
                    <input type="range" id="letterSpacingSlider" min="-2" max="30" value="2" oninput="updateLiveStyle()">
                    <span class="slider-val" id="letterSpacingVal">2px</span>
                </div>
            </div>

            <div class="group">
                <label>Max Bound Print Boundary Width Target (%)</label>
                <div class="slider-container">
                    <input type="range" id="maxWidthSlider" min="40" max="100" value="85" oninput="updateLiveStyle()">
                    <span class="slider-val" id="maxWidthVal">85%</span>
                </div>
            </div>

            <div class="group">
                <label>Layout Text Alignment</label>
                <div class="segmented" id="alignSegment">
                    <button class="active" onclick="setTextAlign('center')">Center</button>
                    <button onclick="setTextAlign('left')">Left</button>
                    <button onclick="setTextAlign('right')">Right</button>
                </div>
            </div>

            <div class="group">
                <label>Text Transformation Matrix Case</label>
                <div class="segmented" id="transformSegment">
                    <button class="active" onclick="setTextTransform('uppercase')">UPPER</button>
                    <button onclick="setTextTransform('none')">As Typed</button>
                    <button onclick="setTextTransform('capitalize')">Title</button>
                </div>
            </div>

            <div class="group">
                <label>Studio Grid Apparel Background Preview Only (Always Transparent Export)</label>
                <div class="segmented" id="bgSegment">
                    <button class="active" onclick="setPreviewBg('transparent')">Transparent</button>
                    <button onclick="setPreviewBg('white')">White</button>
                    <button onclick="setPreviewBg('black')">Black</button>
                    <button onclick="setPreviewBg('grey')">Grey</button>
                </div>
            </div>
        </div>

        <!-- Panel 3: Responsive Variant Output Matrix Generation Grid -->
        <div class="panel">
            <div class="preview-header">
                <h2>Generated Matrix Grid Output</h2>
                <div style="display:flex; gap:8px;">
                    <button class="primary" style="width: auto; padding: 8px 16px; background: #E52E2E;" onclick="uploadToPrintful()" id="uploadPrintfulBtn">☁️ Upload to Printful</button>
                    <button class="primary" style="width: auto; padding: 8px 16px;" onclick="downloadAllZip()">Bulk Compile ZIP Package</button>
                </div>
            </div>
            <div class="grid" id="previewGrid"></div>
        </div>
    </div>

    <!-- Background Process Loading Overlay Modal HUD Layout -->
    <div class="loader-overlay" id="loadingHUD">
        <div class="spinner"></div>
        <div id="loaderStatusText" style="font-size: 13px; font-weight: 500;">Compiling Assets to Canvas Space Matrix...</div>
    </div>

    <!-- Zoom Preview Lightbox HUD -->
    <div class="modal" id="previewModal" onclick="closeLightboxModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="canvas-container-wrapper bg-transparent" id="modalCanvasTarget"></div>
        </div>
    </div>

    <script>
        // Pre-seeded System Native Standard Functional Blueprints Configuration Array
        const defaultBlueprints = [
            { id: "b1", template: "{hobby} is my cardio", font: "Bebas Neue", color: "#0A0A0A", size: "380", spacing: "2", transform: "uppercase", align: "center", altFont: false },
            { id: "b2", template: "World's okayest {role}", font: "Playfair Display", color: "#C5573A", size: "320", spacing: "1", transform: "none", align: "center", altFont: true },
            { id: "b3", template: "Just here for the {noun}", font: "Anton", color: "#0A0A0A", size: "400", spacing: "0", transform: "uppercase", align: "center", altFont: false },
            { id: "b4", template: "Property of the {name} family", font: "Archivo Black", color: "#1F2D4F", size: "280", spacing: "4", transform: "uppercase", align: "center", altFont: false },
            { id: "b5", template: "Currently reading: {book}", font: "Fraunces", color: "#7A8B6F", size: "310", spacing: "1", transform: "none", align: "center", altFont: true }
        ];

        // Search Query Trend Automation Preset Libraries
        const trendDatabase = {
            runners: {
                template: "ALREADY TIRED / {club} RUN CLUB",
                values: "BACKYARD\nSLOW PACED\nPOST-RUN BEER\nAPATHETIC\nMID-PACK\nZERO MILES\n6AM PANIC\nLAST PLACE"
            },
            corporate: {
                template: "{profession} / CHAOS COORDINATOR",
                values: "SOFTWARE ENGINEER\nPROJECT MANAGER\nHR MANAGER\nRETAIL BOSS\nDATA ANALYST\nER NURSE\nNIGHT SHIFT"
            },
            dogs: {
                template: "JUDGED SILENTLY BY MY {breed}",
                values: "FRENCH BULLDOG\nCORGI\nGOLDEN RETRIEVER\nBORDER COLLIE\nGERMAN SHEPHERD\nCHIHUAHUA"
            }
        };

        let appState = {
            savedBlueprints: [],
            currentTextAlign: 'center',
            currentTextTransform: 'uppercase',
            currentPreviewBg: 'transparent',
            altFontEnabled: false
        };

        window.addEventListener('DOMContentLoaded', () => {
            initStorageEngineData();
            renderBlueprintChips();
            generateGrid();
        });

        function initStorageEngineData() {
            const raw = localStorage.getItem('pod_studio_blueprints');
            if (raw) {
                appState.savedBlueprints = JSON.parse(raw);
            } else {
                appState.savedBlueprints = [...defaultBlueprints];
                localStorage.setItem('pod_studio_blueprints', JSON.stringify(appState.savedBlueprints));
            }
        }

        function renderBlueprintChips() {
            const container = document.getElementById('templateChips');
            container.innerHTML = '';
            appState.savedBlueprints.forEach(bp => {
                const chip = document.createElement('div');
                chip.className = 'chip';
                chip.innerText = bp.template;
                chip.onclick = () => loadStructuralBlueprint(bp);
                container.appendChild(chip);
            });
        }

        // Auto-Injection Variable Loading Engine Logic Block
        function injectTrendVariables() {
            const selector = document.getElementById('hijackSelector');
            const targetKey = selector.value;
            if (!targetKey || !trendDatabase[targetKey]) return;

            const selectedTrend = trendDatabase[targetKey];
            document.getElementById('templateInput').value = selectedTrend.template;
            document.getElementById('bulkValues').value = selectedTrend.values;
            
            // Auto switch style engine variables to make trend variations pop immediately
            if (targetKey === 'runners') {
                document.getElementById('fontFamily').value = "Bebas Neue";
                toggleAltFont(false);
            } else if (targetKey === 'dogs') {
                document.getElementById('fontFamily').value = "Playfair Display";
                toggleAltFont(true);
            }
            
            generateGrid();
            selector.value = ""; // reset dropdown
        }

        async function generateLiveTrend() {
            const btn = document.getElementById('aiTrendBtn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '🤖 Thinking of a trend...';
            btn.disabled = true;
            
            const count = document.getElementById('aiVariationCount').value;
            
            try {
                const res = await fetch('/api/generate-trend', { 
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ count: count })
                });
                const data = await res.json();
                
                if (!res.ok) {
                    throw new Error(data.error || 'Failed to fetch trend');
                }
                
                document.getElementById('templateInput').value = data.template;
                document.getElementById('bulkValues').value = data.values.join('\n');
                
                // Switch to a nice display font when AI generates
                document.getElementById('fontFamily').value = "Archivo Black";
                toggleAltFont(true);
                
                generateGrid();
            } catch (err) {
                console.error("AI Trend Error:", err);
                alert('AI Trend Error: ' + err.message);
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        function toggleAltFont(boolVal) {
            appState.altFontEnabled = boolVal;
            document.getElementById('altFontTrue').classList.toggle('active', boolVal);
            document.getElementById('altFontFalse').classList.toggle('active', !boolVal);
            updateLiveStyle();
        }

        function setPresetColor(hex) {
            document.getElementById('textColorHex').value = hex;
            updateLiveStyle();
        }

        function setTextAlign(align) {
            appState.currentTextAlign = align;
            const buttons = document.querySelectorAll('#alignSegment button');
            buttons.forEach(btn => btn.classList.toggle('active', btn.innerText.toLowerCase() === align));
            updateLiveStyle();
        }

        function setTextTransform(transform) {
            appState.currentTextTransform = transform;
            const buttons = document.querySelectorAll('#transformSegment button');
            buttons.forEach(btn => btn.classList.toggle('active', btn.innerText.replace('UPPER', 'uppercase').replace('As Typed', 'none').replace('Title', 'capitalize') === transform));
            updateLiveStyle();
        }

        function setPreviewBg(bgClass) {
            appState.currentPreviewBg = bgClass;
            const buttons = document.querySelectorAll('#bgSegment button');
            buttons.forEach(btn => btn.classList.toggle('active', btn.innerText.toLowerCase() === bgClass));
            
            const containers = document.querySelectorAll('.canvas-container-wrapper');
            containers.forEach(el => {
                el.className = 'canvas-container-wrapper bg-' + bgClass;
            });
        }

        function saveCurrentTemplate() {
            const currentText = document.getElementById('templateInput').value;
            if (!currentText.trim()) return;

            const newBlueprint = {
                id: 'bp_' + Date.now(),
                template: currentText,
                font: document.getElementById('fontFamily').value,
                color: document.getElementById('textColorHex').value,
                size: document.getElementById('fontSizeSlider').value,
                spacing: document.getElementById('letterSpacingSlider').value,
                transform: appState.currentTextTransform,
                align: appState.currentTextAlign,
                altFont: appState.altFontEnabled
            };

            appState.savedBlueprints.unshift(newBlueprint);
            localStorage.setItem('pod_studio_blueprints', JSON.stringify(appState.savedBlueprints));
            renderBlueprintChips();
        }

        function loadStructuralBlueprint(bp) {
            document.getElementById('templateInput').value = bp.template;
            document.getElementById('fontFamily').value = bp.font;
            document.getElementById('textColorHex').value = bp.color;
            document.getElementById('fontSizeSlider').value = bp.size;
            document.getElementById('letterSpacingSlider').value = bp.spacing;
            
            toggleAltFont(bp.altFont);
            setTextAlign(bp.align);
            setTextTransform(bp.transform);
            updateLiveStyle();
        }

        function updateLiveStyle() {
            const font = document.getElementById('fontFamily').value;
            const color = document.getElementById('textColorHex').value;
            const size = document.getElementById('fontSizeSlider').value;
            const spacing = document.getElementById('letterSpacingSlider').value;
            const maxWidth = document.getElementById('maxWidthSlider').value;

            document.getElementById('fontSizeVal').innerText = size + 'px';
            document.getElementById('letterSpacingVal').innerText = spacing + 'px';
            document.getElementById('maxWidthVal').innerText = maxWidth + '%';

            const targets = document.querySelectorAll('.tshirt-canvas');
            targets.forEach(canvas => {
                canvas.style.fontFamily = font;
                canvas.style.color = color;
                canvas.style.fontSize = size + 'px';
                canvas.style.letterSpacing = spacing + 'px';
                canvas.style.textAlign = appState.currentTextAlign;
                canvas.style.textTransform = appState.currentTextTransform;
                
                const wrapper = canvas.querySelector('.text-wrapper-box');
                if (wrapper) wrapper.style.width = maxWidth + '%';

                if (appState.altFontEnabled) {
                    canvas.classList.add('alt-font-active');
                } else {
                    canvas.classList.remove('alt-font-active');
                }
            });
        }

        // Parse Text strings safely separating single inputs or multi-layer structures
        function getParsedLinesArray() {
            const rawTemplate = document.getElementById('templateInput').value;
            const rawTextarea = document.getElementById('bulkValues').value;
            const lines = rawTextarea.split('\n').map(l => l.trim()).filter(l => l.length > 0);
            
            // Extract placeholder key names array signature inside brackets
            const placeholderMatches = rawTemplate.match(/\{([^}]+)\}/g);
            
            return lines.map(line => {
                let computedOutput = rawTemplate;
                let shortSlug = "design";

                if (placeholderMatches && placeholderMatches.length > 0) {
                    // Match single variable parsing loop
                    const placeholderKey = placeholderMatches[0];
                    // Replace the raw markup wrapper structure safely with highlighted or stylized nodes
                    const secureReplacerText = `<span class="placeholder-highlight">${line}</span>`;
                    computedOutput = computedOutput.replace(placeholderKey, secureReplacerText);
                    shortSlug = line.toLowerCase().replace(/[^a-z0-9]/g, '-');
                }
                return { htmlString: computedOutput, slug: shortSlug };
            });
        }

        function generateGrid() {
            const grid = document.getElementById('previewGrid');
            grid.innerHTML = '';
            
            const variantCollection = getParsedLinesArray();
            if (variantCollection.length === 0) {
                grid.innerHTML = '<div style="grid-column: 1/-1; padding: 40px; text-align:center; color: var(--text-muted); font-size:13px;">Enter variant parameters to populate production tracking matrix cells.</div>';
                return;
            }

            // Calculation mapping engine scale ratio logic configuration space
            const previewCardScaleFactor = 240 / 4500;

            variantCollection.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'card';

                const wrapper = document.createElement('div');
                wrapper.className = `canvas-container-wrapper bg-${appState.currentPreviewBg}`;
                
                const canvas = document.createElement('div');
                canvas.className = 'tshirt-canvas';
                canvas.id = `canvas-node-${index}`;
                canvas.style.transform = `scale(${previewCardScaleFactor})`;

                const textBox = document.createElement('div');
                textBox.className = 'text-wrapper-box';
                textBox.innerHTML = `<div class="text-line">${item.htmlString}</div>`;

                canvas.appendChild(textBox);
                wrapper.appendChild(canvas);
                card.appendChild(wrapper);

                // Actions toolbar tray assembly attachment
                const tray = document.createElement('div');
                tray.className = 'card-actions';
                
                const btnZoom = document.createElement('button');
                btnZoom.innerText = 'Zoom View';
                btnZoom.onclick = () => openLightboxModal(item.htmlString);
                
                const btnDown = document.createElement('button');
                btnDown.innerText = 'Export PNG';
                btnDown.onclick = () => exportSingleCanvasPNG(index, item.slug);

                tray.appendChild(btnZoom);
                tray.appendChild(btnDown);
                card.appendChild(tray);
                grid.appendChild(card);
            });

            updateLiveStyle();
        }

        function openLightboxModal(innerMarkupStr) {
            const target = document.getElementById('modalCanvasTarget');
            target.innerHTML = '';
            
            const modalScaleFactor = 476 / 4500;
            const cloneCanvas = document.createElement('div');
            cloneCanvas.className = 'tshirt-canvas';
            cloneCanvas.style.transform = `scale(${modalScaleFactor})`;
            
            const textBox = document.createElement('div');
            textBox.className = 'text-wrapper-box';
            textBox.innerHTML = `<div class="text-line">${innerMarkupStr}</div>`;
            
            cloneCanvas.appendChild(textBox);
            target.appendChild(cloneCanvas);
            document.getElementById('previewModal').style.display = 'flex';
            updateLiveStyle();
        }

        function closeLightboxModal() {
            document.getElementById('previewModal').style.display = 'none';
        }

        // High-DPI Isolated Processing Engine for Transparent PNG Exports
        async function renderHighResBlob(nodeIndex) {
            const targetSourceNode = document.getElementById(`canvas-node-${nodeIndex}`);
            if (!targetSourceNode) return null;

            // Save visual working scale vector track signature states
            const originalInlineTransformStyle = targetSourceNode.style.transform;
            
            // Set element matrix back to full structural bounds 
            targetSourceNode.style.transform = 'none';
            
            const processingOptions = {
                backgroundColor: null,
                scale: 1,
                width: 4500,
                height: 5400,
                logging: false,
                useCORS: true
            };

            const canvasOutputElement = await html2canvas(targetSourceNode, processingOptions);
            
            // Re-apply original presentation scaling footprint safely
            targetSourceNode.style.transform = originalInlineTransformStyle;
            
            return new Promise(resolve => {
                canvasOutputElement.toBlob(b => resolve(b), 'image/png');
            });
        }

        async function exportSingleCanvasPNG(nodeIndex, fileSlugStr) {
            const hud = document.getElementById('loadingHUD');
            document.getElementById('loaderStatusText').innerText = 'Rendering Isolated Canvas Blueprint Matrix...';
            hud.style.display = 'flex';

            try {
                const blob = await renderHighResBlob(nodeIndex);
                if (blob) {
                    const downloadAnchorElement = document.createElement('a');
                    downloadAnchorElement.href = URL.createObjectURL(blob);
                    downloadAnchorElement.download = `design-${fileSlugStr}.png`;
                    downloadAnchorElement.click();
                }
            } catch (err) {
                console.error("Canvas isolation export layer fault event:", err);
            } finally {
                hud.style.display = 'none';
            }
        }

        // Sequential Zip Compile Batching Strategy safely prevents crashing browser tracking layers
        async function downloadAllZip() {
            const variantCollection = getParsedLinesArray();
            if (variantCollection.length === 0) return;

            const hud = document.getElementById('loadingHUD');
            hud.style.display = 'flex';

            const archive = new JSZip();

            for (let i = 0; i < variantCollection.length; i++) {
                document.getElementById('loaderStatusText').innerText = `Compiling print file matrix item ${i + 1} of ${variantCollection.length}...`;
                
                try {
                    const imgBlob = await renderHighResBlob(i);
                    if (imgBlob) {
                        archive.file(`design-${variantCollection[i].slug}.png`, imgBlob);
                    }
                } catch (canvasErr) {
                    console.error(`Canvas rendering failure index layer ${i}:`, canvasErr);
                }
            }

            document.getElementById('loaderStatusText').innerText = 'Packing ZIP compression container streams...';
            const zipOutputContentBlob = await archive.generateAsync({ type: "blob" });
            
            const bundleTriggerAnchor = document.createElement('a');
            bundleTriggerAnchor.href = URL.createObjectURL(zipOutputContentBlob);
            bundleTriggerAnchor.download = "studio-batch-pack-designs.zip";
            bundleTriggerAnchor.click();

            hud.style.display = 'none';
        }

        // Upload to Printful (Restored Functionality)
        async function uploadToPrintful() {
            const variantCollection = getParsedLinesArray();
            if (variantCollection.length === 0) {
                alert('No designs to upload');
                return;
            }

            const btn = document.getElementById('uploadPrintfulBtn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '☁️ Uploading...';
            btn.disabled = true;

            const hud = document.getElementById('loadingHUD');
            hud.style.display = 'flex';

            let successCount = 0;

            try {
                for (let i = 0; i < variantCollection.length; i++) {
                    const item = variantCollection[i];
                    document.getElementById('loaderStatusText').innerText = `Uploading design ${i + 1} of ${variantCollection.length} to Printful...`;
                    
                    const imgBlob = await renderHighResBlob(i);
                    if (!imgBlob) continue;
                    
                    // Convert blob to base64
                    const base64Data = await new Promise((resolve) => {
                        const reader = new FileReader();
                        reader.onloadend = () => resolve(reader.result);
                        reader.readAsDataURL(imgBlob);
                    });

                    const res = await fetch('/api/upload-printful', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            base64Image: base64Data,
                            filename: `design-${item.slug}.png`
                        })
                    });

                    const data = await res.json();
                    if (!res.ok) {
                        console.error("Printful Error", data);
                        throw new Error(data.error || 'Upload failed');
                    }
                    successCount++;
                }
                alert(`Successfully uploaded ${successCount} designs to Printful!`);
            } catch (err) {
                console.error("Upload failed:", err);
                alert('Upload failed: ' + err.message);
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
                hud.style.display = 'none';
            }
        }
    </script>
